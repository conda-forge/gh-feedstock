context:
  version: 2.89.0

package:
  name: gh
  version: ${{ version }}

source:
  url: https://github.com/cli/cli/archive/v${{ version }}.tar.gz
  sha256: bc9c11f75e4aeb7e1f0bd5f543a3edabb8958655025f8cdc3d9bbe14435a7441
  target_directory: src

build:
  number: 0
  script:
    env:
      GH_VERSION: v{{ version }}
    content:
      - cd src
      - go-licenses save . --save_path ../library_licenses
      - if: unix
        then:
          - go build -v -o $PREFIX/bin/gh -ldflags="-s -w"
        else:
          - go build -v -o %LIBRARY_BIN%\gh.exe -ldflags="-s"
      - if: unix
        then:
          - make manpages
          - mkdir -p $PREFIX/share/man/man1
          - install -m644 ./share/man/man1/* $PREFIX/share/man/man1
          - mkdir -p $PREFIX/share/zsh/site-functions $PREFIX/share/bash-completion/completions $PREFIX/share/fish/vendor_completions.d
          - $PREFIX/bin/gh completion --shell zsh > $PREFIX/share/zsh/site-functions/_gh
          - $PREFIX/bin/gh completion --shell bash > $PREFIX/share/bash-completion/completions/gh
          - $PREFIX/bin/gh completion --shell fish > $PREFIX/share/fish/vendor_completions.d/gh.fish

requirements:
  build:
    - ${{ compiler('go-nocgo') }}
    - if: unix
      then:
        - make

tests:
  - script:
      - gh help
      - gh version
  - package_contents:
      bin:
        - gh
      files:
        - if: unix
          then:
            - share/bash-completion/completions/example-package
            - share/fish/vendor_completions.d/example-package.fish
            - share/zsh/site-functions/_example-package
            - share/man/man1/gh*

about:
  homepage: https://github.com/cli/cli
  license: Apache-2.0
  license_file:
    - src/LICENSE
    - library_licenses/
  summary: Github CLI.
  documentation: https://cli.github.com/
  repository: https://github.com/cli/cli

extra:
  recipe-maintainers:
    - mxr-conda
    - rluria14
    - oblute
    - matthiasdiener
    - pavelzw
